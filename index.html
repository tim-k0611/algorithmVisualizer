<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sortieralgorithmen</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>

    <body class="bg-dark">
        <nav class="navbar navbar-dark">
            <span class="navbar-brand mb-0 h1">SORTING VISUALIZER</span>
        </nav>

        <div class="container-fluid">
            <div class="row mt-3">
                <div class="col-md-3 mb-2 mb-md-0">
                    <select class="form-select" id="algorithmSelect">
                        <option value="selectionsort" selected>Selection Sort</option>
                        <option value="quicksortLastPivot">Quicksort (Last Pivot)</option>
                        <option value="quicksortMedianPivot">Quicksort (Median Pivot)</option>
                        <option value="quicksortRandomPivot">Quicksort (Random Pivot)</option>
                    </select>
                </div>
                <div class="col-md-3 mb-2 mb-md-0">
                    <select class="form-select" id="arraySizeSelect">
                        <option>10</option>
                        <option selected>20</option>
                        <option>50</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <div class="btn-group" role="group">
                        <button id="startBtn" type="button" class="btn btn-primary">▶ Start</button>
                        <button id="pauseBtn" type="button" class="btn btn-warning">⏸ Pause</button>
                        <button id="stopBtn" type="button" class="btn btn-danger">⏹ Stop</button>
                        <button id="generateNewArrayBtn" type="button" class="btn btn-success" onclick="generateNewArray(document.getElementById('arraySizeSelect').value)">Generate New Array</button>
                    </div>
                </div>
            </div>
            
            <div class="row mt-3">
                <div class="col-md-6">
                    <label class="text-light">Speed</label>
                    <input type="range" id="speedRange" class="form-range" value="50">
                    <output for="speedRange" id="speedRangeValue" aria-hidden="true" class="text-light"></output>
                </div>
            </div>
            
            <div class="row mt-4">
                <div id="canvasContainer" style="display: flex; gap: 5px; align-items: flex-end;" class="col-12">
            </div>
        </div>

        <script src="sortalgorithms.js"></script>
        <!-- Bootsrap JS-->
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    </body>
</html>
